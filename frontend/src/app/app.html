<div class="main-container">
  @switch (gameState.gameState()) {
    @case ('INTRO') {
      <app-intro></app-intro>
    }
    @case ('DEALING') {
      <section class="dealing-screen">
        <div class="deck-container">
          @for (card of gameState.heroOptions(); track card._id) {
            <app-card
              [card]="card"
              [currentTexts]="gameState.texts()"
              class="deck-card"
            >
            </app-card>
          }
        </div>
      </section>
    }
    @case ('SELECTION') {
      <app-selection></app-selection>
    }
    @case ('BATTLE') {
      <app-battle></app-battle>
    }
  }
</div>

<div class="orientation-lock">
  <div class="lock-content">
    <div class="phone-icon"></div>
    <h2>{{ gameState.texts().ORIENTATION.TITLE }}</h2>
    <p>{{ gameState.texts().ORIENTATION.SUBTITLE }}</p>
  </div>
</div>
